<!DOCTYPE html>
<html>
<head>
  <title>{{ page.title }}</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #333;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
    }

    main {
      max-width: 800px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #111;
      color: white;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>My Blog 🚀</h1>
  <p>Learning and sharing</p>
</header>

<nav>
  <a href="/">Home</a>
</nav>

<main>
  {{ content }}
</main>

<footer>
  <p>© 2026 My Blog</p>
</footer>

</body>
</html>
